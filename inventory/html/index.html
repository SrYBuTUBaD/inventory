<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
html, body {
    background: none !important;
    margin: 0; padding: 0;
    overflow: hidden;
    width: 100vw; height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #e0e0e0;
}
* { margin:0; padding:0; box-sizing:border-box; user-select:none; }

#inventory-wrapper {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    gap: 16px;
    align-items: flex-start;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
}
#inventory-wrapper.visible {
    opacity: 1;
    pointer-events: all;
}

.inv-panel {
    background:rgba(0, 0, 0, 0.850);
    border-radius:0px;
    padding:40px 40px 40px;
    width:520px;
    height:600px;
    display:flex;
    flex-direction:column;
    box-shadow:0 6px 30px rgba(0,0,0,0.5);
}
.inv-header { display:flex; align-items:center; gap:8px; margin-bottom:4px; flex-shrink:0; }
.inv-title { font-size:22px; font-weight:700; color:#ffffff; flex:1; }
.action-btn { background:rgba(255,255,255,0.08); border:none; color:#bbb; border-radius:6px; width:30px; height:30px; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s,color .15s; }
.action-btn:hover { background:rgba(255,255,255,0.16); color:#fff; }
.inv-weight-text { font-size:13px; color:#4caf50; font-weight:600; margin-bottom:12px; flex-shrink:0; }
.inv-grid {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-auto-rows:min-content;
    gap:30px;
    margin-bottom:14px;
    flex:1;
    overflow-y:auto;
    overflow-x:hidden;
    padding-right:14px;
}
.inv-grid::-webkit-scrollbar { width:8px; }
.inv-grid::-webkit-scrollbar-track { background:rgba(255,255,255,0.04); border-radius:4px; }
.inv-grid::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.25); border-radius:4px; }
.inv-grid::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,0.4); }
.inv-slot { aspect-ratio:1; border-radius:0px; display:flex; align-items:center; justify-content:center; position:relative; cursor:pointer; transition:background .15s; }
.inv-slot.empty { background:transparent; border:4px dashed rgba(255, 255, 255, 0.500); }
.inv-slot.empty:hover { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.3); }
.inv-slot.filled { background:rgba(255,255,255,0.06); border:none; }
.inv-slot.filled:hover { background:rgba(255,255,255,0.1); }
.inv-slot.dragging { opacity:.3; }
.inv-item { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; cursor:grab; padding:6px; border-radius:6px; }
.inv-item:active { cursor:grabbing; }
.item-icon { width:70%; height:70%; font-size:36px; line-height:1; flex-shrink:0; filter:drop-shadow(0 1px 3px rgba(0,0,0,0.5)); }
.item-count { position:absolute; bottom:3px; right:5px; font-size:11px; font-weight:700; color:#fff; background:rgba(0,0,0,0.75); min-width:18px; height:18px; display:flex; align-items:center; justify-content:center; padding:0 4px; border-radius:10px; }
.close-btn { width:auto; flex-shrink:0; background:none; border:none; color:#888; font-size:12px; letter-spacing:.12em; cursor:pointer; padding:6px; text-align:left; transition:color .15s; }
.close-btn:hover { color:#e74c3c; }
.hidden { display:none !important; }
#drag-ghost { position:fixed; pointer-events:none; z-index:1000; transform:translate(-50%,-50%); font-size:32px; background:rgba(12,12,16,0.88); border-radius:8px; width:52px; height:52px; display:flex; align-items:center; justify-content:center; opacity:.9; }
.selected-info { font-size:13px; margin-bottom:10px; min-height:18px; flex-shrink:0; visibility:hidden; }
.footer-row { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.action-row { display:flex; gap:10px; overflow:hidden; flex:0 0 0; width:0; visibility:hidden; }
.action-row.active { flex:1; width:auto; visibility:visible; }
.act-btn { flex:1; border:none; border-radius:2px; padding:10px 0; font-size:12px; font-weight:700; letter-spacing:.05em; cursor:pointer; color:#fff; transition:opacity .15s; }
.act-btn:hover { opacity:0.85; }
.act-use  { background:rgb(40, 212, 40); }
.act-drop { background:rgb(255, 67, 50); }
.act-give { background:rgba(255,255,255,0.12); }
    </style>
</head>
<body>
    <!-- ox_inventory Trick: UI immer im DOM, nur opacity:0 wenn zu -->
    <div id="inventory-wrapper">
        <div class="inv-panel" id="panel-player">
            <div class="inv-header">
                <span class="inv-title">Inventar</span>
                <span id="money-text" style="color:#4caf50; font-weight:700; font-size:13px; margin-right:4px;"></span>
                <button class="action-btn">🔑</button>
                <button class="action-btn" id="refresh-btn">↻</button>
                <button class="action-btn">🔫</button>
                <button class="action-btn">🛡️</button>
                <button class="action-btn" id="arrow-btn">→</button>
            </div>
            <div class="inv-weight-text" id="player-weight-text">0.00 / 50.00 KG</div>
            <div class="inv-grid" id="player-grid"></div>

            <div class="selected-info" id="selected-info">
                <span style="color:#fff;">Aktuell ausgewählt:</span>
                <span id="selected-name" style="color:#4caf50; font-weight:700;"></span>
            </div>

            <div class="footer-row">
                <div class="action-row" id="action-row">
                    <button class="act-btn act-use" id="sel-use">BENUTZEN</button>
                    <button class="act-btn act-drop" id="sel-drop">DROP</button>
                    <button class="act-btn act-give" id="sel-give">GEBEN</button>
                </div>
                <button class="close-btn" id="close-btn">SCHLIESSEN</button>
                <button class="action-btn" id="extra-btn" style="margin-left:auto;">🪪</button>
            </div>
        </div>
        <div class="inv-panel hidden" id="panel-trunk">
            <div class="inv-header">
                <span class="inv-title">Kofferraum</span>
                <button class="action-btn" style="margin-left:auto">↻</button>
            </div>
            <div class="inv-weight-text" id="trunk-weight-text">0.00 / 350.00 KG</div>
            <div class="inv-grid" id="trunk-grid"></div>
        </div>
    </div>

    <div id="split-modal" class="hidden">
        <div id="split-box">
            <div id="split-title">Anzahl</div>
            <input id="split-input" type="number" min="1" placeholder="0">
            <div id="split-btns">
                <button id="split-confirm">✓</button>
                <button id="split-cancel">✕</button>
            </div>
        </div>
    </div>

    <style>
    #split-modal {
        position: fixed;
        left: 50%;
        top: 67%;
        transform: translate(-50%, -50%);
        z-index: 2000;
    }
    #split-box {
        background: rgba(0, 0, 0, 0.900);
        border: 1px solid rgba(255, 255, 255, 0);
        border-radius: 0px;
        padding: 24px 28px;
        min-width: 240px;
        display: flex; flex-direction: column; gap: 14px;
    }
    #split-title { font-size: 20px; font-weight: 700; color: #fff; }
    #split-info  { display: none; }
    #split-input {
        background: transparent;
        border: none;
        border-bottom: 2px solid rgba(255, 255, 255, 0);
        border-radius: 0;
        color: rgb(255, 255, 235); font-size: 21px;
        text-align: center;
        padding: 6px 2px; width: 100%;
        outline: none;
    }
    #split-input:focus { border-bottom-color: rgba(255,255,255,0.7); }
    #split-btns { display: flex; gap: 10px; }
    #split-confirm { flex:1; background:rgb(40, 212, 40); border:none; border-radius:2px; color:#fff; font-weight:700; font-size:18px; padding:9px 0; cursor:pointer; }
    #split-cancel  { flex:1; background:rgb(255, 67, 50); border:none; border-radius:2px; color:#fff; font-size:18px; font-weight:700; padding:9px 0; cursor:pointer; }
    #split-confirm:hover { opacity:0.85; }
    #split-cancel:hover  { opacity:0.85; }
    </style>

    <script src="js/app.js"></script>
</body>
</html>
